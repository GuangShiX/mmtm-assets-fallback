name: Update critical icons

on:
  schedule:
    - cron: "37 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: mementomori-fallback-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Check out image repository
        uses: actions/checkout@v6

      - name: Check out tracker
        uses: actions/checkout@v6
        with:
          repository: GuangShiX/mmtm-apk-tracker
          path: _tracker

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: _tracker/requirements.txt

      - name: Install Python dependencies
        run: python -m pip install -r _tracker/requirements.txt

      - name: Detect and merge image updates
        run: >-
          python _tracker/fallback.py
          --auto-update
          --output .
          --repository GuangShiX/mmtm-assets-fallback

      - name: Commit image changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A assets manifest.json latest.json
          if git diff --cached --quiet; then
            echo "No image changes detected."
            exit 0
          fi
          version="$(python -c 'import json; print(json.load(open("manifest.json", encoding="utf-8"))["version"])')"
          git commit -m "Update MementoMori images for $version"
          git push origin main
          git fetch --tags
          if ! git rev-parse "refs/tags/v$version" >/dev/null 2>&1; then
            git tag "v$version"
            git push origin "v$version"
          fi

      - name: Show remaining disk space
        if: always()
        run: df -h
